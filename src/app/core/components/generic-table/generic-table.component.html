<div class="row align-items-baseline">
    <div class="col-9">
        <mat-form-field appearance="outline">
            <mat-label>Filter</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input>
        </mat-form-field>
    </div>

    @if (canAdd) {
          <button 
            matButton="outlined"
            class="col-3 add-button"
            (click)="addItem()"
          >
            + Add item
          </button>
    }
</div>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort>

    @for (columnName of displayedColumns; track columnName) {
        <span>{{columnName}}</span>
        <ng-container matColumnDef="{{ columnName }}">
            @if (columnName === 'edit') {
              <th mat-header-cell *matHeaderCellDef></th>
              <td mat-cell *matCellDef="let row" class="edit-cell">
                <button mat-button="outlined" (click)="editItem(row)">
                  <i class="bi bi-pen edit-icon"></i>
                </button>
              </td>
            }
            @else {
              <th 
                mat-header-cell 
                *matHeaderCellDef 
                mat-sort-header
                class="fw-bold"> 
                {{ tableConfig.customFormInputs | columnLabelPipe : columnName }} 
              </th>
              <td mat-cell *matCellDef="let row"> {{ row[columnName] }} </td>
            }
        </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
</div>
