<div class="m-1">
    
    @if (navigations && navigations.length > 0) {
        <div cdkDropList 
            class="example-list" 
            (cdkDropListDropped)="drop($event)"
            [cdkDropListData]="navigations"
            cdkDropListOrientation="mixed"
            [cdkDropListDisabled]="!containerPermissionName.includes('edit')">
            
            @for (navigation of navigations; track navigation.id) {
                <div class="example-box" cdkDrag>
                        
                    @if (containerPermissionName.includes('edit')) {
                        <i class="bi bi-arrows-move drag-icon" cdkDragHandle></i>
                    }
                    
                    <app-navigation
                        [_navigation]="navigation"
                        [_canAdd]="navigation.permissionName?.includes('add')"
                        [_canEdit]="navigation.permissionName?.includes('edit')"
                        [_canDelete]="navigation.permissionName?.includes('delete')"
                    >
                    </app-navigation>
                </div>
            }
        </div>
    }
    
    @if (containerPermissionName.includes('add')) {
        <button 
            matButton 
            [matMenuTriggerFor]="menu" 
            class="add-nav-button">
            +
        </button>
        <mat-menu #menu="matMenu">
            @if (navigations.length === 0) {
                <button mat-menu-item (click)="openFormToAddNavigationBarOrComponent('header-bar')">Add navigation bar</button>
            }
            <button mat-menu-item (click)="openFormToAddNavigationBarOrComponent('component')">Add component</button>
        </mat-menu>
    }
    
</div>
