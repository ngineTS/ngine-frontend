<div class="m-1">
    
    @if (navigation.children && navigation.children.length > 0) {
        <div cdkDropList 
            class="example-list" 
            (cdkDropListDropped)="drop($event)"
            [cdkDropListData]="navigation.children"
            cdkDropListOrientation="mixed"
            [cdkDropListDisabled]="!navigation.permissionName?.includes('edit')">
            
            <!-- List of navigations -->
            @for (child of navigation.children; track child.id) {
                <div class="example-box" cdkDrag>
                    
                    <!-- Top left drag icon -->
                    @if (navigation.permissionName?.includes('edit')) {
                        <i class="bi bi-arrows-move drag-icon" 
                           cdkDragHandle
                           [style.margin-top]="child.containerLayout.marginTop + 'px'"
                           [style.margin-left]="child.containerLayout.marginLeft + 'px'"
                        ></i>
                    }
                    
                    <!-- Navigation object -->
                    <app-navigation
                        [_navigation]="child"
                        [_canAdd]="child.permissionName?.includes('add')"
                        [_canEdit]="child.permissionName?.includes('edit')"
                        [_canDelete]="child.permissionName?.includes('delete')"
                    >
                    </app-navigation>
                </div>
            }
        </div>
    }
    
    <!-- Add navigation button -->
    @if (navigation.permissionName?.includes('add')) {
        <button 
            matButton 
            [matMenuTriggerFor]="menu" 
            class="add-nav-button">
            +
        </button>
        <mat-menu #menu="matMenu">
            @if (navigation.children?.length === 0) {
                <button mat-menu-item (click)="openFormToAddNavigationBarOrNavigation('navigation-bar')">Add navigation bar</button>
            }
            <button mat-menu-item (click)="openFormToAddNavigationBarOrNavigation('navigation')">Add navigation</button>
        </mat-menu>
    }
    
</div>
