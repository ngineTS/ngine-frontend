<div class="m-2">
    @if (isSavingOrder) {
        <mat-spinner [diameter]="50"></mat-spinner>
    }
    @if (navigations && navigations.length > 0) {
        <div cdkDropList 
            class="example-list" 
            (cdkDropListDropped)="drop($event)"
            [cdkDropListData]="navigations"
            cdkDropListOrientation="mixed">
            @for (navigation of navigations; track navigation) {
                <div class="example-box" cdkDrag>
                    <i class="bi bi-arrows-move drag-icon" cdkDragHandle></i>
                    <ng-template #container></ng-template>
                </div>
            }
        </div>
        <button 
            class="add-nav-button" 
            matTooltip="Add component" 
            (click)="openFormToAddHeaderOrComponent('component')">
            +
        </button>
        <!--<button matButton (click)="onSaveSizes()">
            Save Sizes
        </button>-->
    }
    @else {
        <button 
            matButton 
            [matMenuTriggerFor]="menu" 
            class="add-nav-button">
            +
        </button>
        <mat-menu #menu="matMenu">
            <button mat-menu-item (click)="openFormToAddHeaderOrComponent('header')">Add header</button>
            <button mat-menu-item (click)="openFormToAddHeaderOrComponent('component')">Add component</button>
        </mat-menu>
    }
</div>
