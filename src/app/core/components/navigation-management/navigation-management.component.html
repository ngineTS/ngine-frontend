<div class="container m-4">
    <form [formGroup]="navigationForm" class="row" (ngSubmit)="submitForm()">
        <label for="parent-id">Parent: </label>
        <input id="parent-id" type="text" formControlName="parentId" />

        <label for="display-label">Name: </label>
        <input id="display-label" type="text" formControlName="displayLabel" />

        <mat-form-field>
            <mat-label>Navigation Type: </mat-label>
            <mat-select formControlName="navigationTypeId">
                @for (navigationType of navigationTypes; track navigationType) {
                <mat-option [value]="navigationType.id">{{ navigationType.displayLabel }}</mat-option>
                }
            </mat-select>
        </mat-form-field>

        <mat-checkbox id="disable-input" formControlName="isDisabled">Disable</mat-checkbox>

        @if (data.type === 'header') {
            <label for="color">Color: </label>
            <input id="color" type="text" formControlName="color" />
        }

        <button type="submit" class="float-right">Submit Form</button>
    </form>
</div>
