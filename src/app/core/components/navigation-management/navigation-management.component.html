<div class="m-4">
    <h4>Navigation Management</h4>
    <form [formGroup]="navigationForm" class="row" (ngSubmit)="submitForm()">

        <mat-form-field appearance="outline">
            <mat-label>Navigation Type </mat-label>
            <mat-select formControlName="navigationTypeId">
                @for (navigationType of navigationTypes; track navigationType.name) {
                    <mat-option [disabled]="data.navigation?.id" [value]="navigationType.id">{{ navigationType.displayLabel }}</mat-option>
                }
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Parent </mat-label>
            <mat-select formControlName="parentId">
                    <mat-option [value]="null" style="color: #b3b3b3">None</mat-option>
                @for (parent of parentNavigations; track parent.name) {
                    <mat-option [value]="parent.id">{{ parent.displayLabel }}</mat-option>
                }
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Name</mat-label>
            <input matInput formControlName="displayLabel">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description"></textarea>
        </mat-form-field>

        <mat-checkbox formControlName="isDisabled">Disable</mat-checkbox>
        
        <div class="row form-buttons">
            @if (data.navigation) {
                <button class="col me-3 text-danger" 
                        matButton="outlined" 
                        type="button"
                        (click)="deleteNavigation()">
                        Delete
                </button>
            }
            <button class="col me-3" 
                    matButton="outlined" 
                    type="submit"
                    [disabled]="!navigationForm.valid">
                Save
            </button>
        </div>
    </form>
</div>
