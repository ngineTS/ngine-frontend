@if (content) {
    <h4 class="mb-4">{{ tableConfig.tableLabel }}</h4>
    <app-generic-table 
        [content]="content"
        [canAdd]="_canAdd"
        [canEdit]="_canEdit"
        [canDelete]="_canDelete"
        [tableConfig]="tableConfig"
        (contentChanged)="onContentChange()"
        >
    </app-generic-table>
}
