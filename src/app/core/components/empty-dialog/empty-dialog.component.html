@if (navigationToLoad) {
    <div class="row justify-content-center"
        [style.backgroundColor]="navigationToLoad.containerStyle.backgroundColor"
        [style.border]="navigationToLoad.containerStyle.borderWidth + 'px ' +
            navigationToLoad.containerStyle.borderStyle + ' ' +
            navigationToLoad.containerStyle.borderColor"
        [style.border-top-style]="navigationToLoad.containerStyle.isBorderTopHidden ?
            'none' : navigationToLoad.containerStyle.borderStyle"
        [style.border-right-style]="navigationToLoad.containerStyle.isBorderRightHidden ?
            'none' : navigationToLoad.containerStyle.borderStyle"
        [style.border-bottom-style]="navigationToLoad.containerStyle.isBorderBottomHidden ?
            'none' : navigationToLoad.containerStyle.borderStyle"
        [style.border-left-style]="navigationToLoad.containerStyle.isBorderLeftHidden ?
            'none' : navigationToLoad.containerStyle.borderStyle"
        [style.border-top-left-radius]="navigationToLoad.containerStyle.borderTopLeftRadius + 'px'"
        [style.border-top-right-radius]="navigationToLoad.containerStyle.borderTopRightRadius + 'px'"
        [style.border-bottom-right-radius]="navigationToLoad.containerStyle.borderBottomRightRadius + 'px'"
        [style.border-bottom-left-radius]="navigationToLoad.containerStyle.borderBottomLeftRadius + 'px'"
        [style.margin-top]="navigationToLoad.containerLayout.marginTop + 'px'"
        [style.margin-right]="navigationToLoad.containerLayout.marginRight + 'px'"
        [style.margin-bottom]="navigationToLoad.containerLayout.marginBottom + 'px'"
        [style.margin-left]="navigationToLoad.containerLayout.marginLeft + 'px'"
        [style.padding-top]="navigationToLoad.containerLayout.paddingTop + 'px'"
        [style.padding-right]="navigationToLoad.containerLayout.paddingRight + 'px'"
        [style.padding-bottom]="navigationToLoad.containerLayout.paddingBottom + 'px'"
        [style.padding-left]="navigationToLoad.containerLayout.paddingLeft + 'px'"
        [style.color]="navigationToLoad.typographyStyle.color"
        [style.font-family]="navigationToLoad.typographyStyle.fontFamily"
    >
    
        @if (navigationToLoad.permissionName?.includes('edit')) {
            <button class="edit-button"matButton="outlined" (click)="switchEditMode()">
                @if (_isEditing) {
                    <i class="bi bi-x-circle" [matTooltip]="'Edit content'"></i>
                }
                @else {
                    <i class="bi bi-pen" [matTooltip]="'Stop editing'"></i>
                }
            </button>
            <button class="gear-button" matButton="outlined" (click)="manageNavigationStyle(navigationToLoad)">
                <i class="bi bi-marker-tip" [matTooltip]="'Edit navigation style'"></i>
            </button>
            <button class="gear-button" matButton="outlined" (click)="manageNavigation(navigationToLoad)">
                <i class="bi bi-gear" [matTooltip]="'Edit navigation'"></i>
            </button>
        }

        <div class="m-2">
            <ng-template #container></ng-template>
        </div>
    </div>
}

@else {
    <div class="m-4 row justify-content-center">
        <span class="text-center mb-4">
            There is not yet component attached to this dialog button.
        </span>
        <button matButton="outlined" class="w-50" (click)="manageNavigation()">
            Add component
        </button>
    </div>
}
