@if (_canEdit && _isEditing) {
    <div class="view-container">
        <quill-editor class="w-100" [(ngModel)]="content">
        </quill-editor>
        <button 
            matButton="outlined" 
            class="save-button"
            type="button" 
            (click)="onSaveClick()"
        >   Save
        </button>
    </div>
}
@else {
    @if (content) {
        <div class="view-contianer">
            <quill-view [content]="content"></quill-view>
        </div>
    }
}
