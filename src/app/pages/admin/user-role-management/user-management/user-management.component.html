<div class="row my-4 users-container">

    <mat-form-field class="col-sm-6" appearance="outline">
        <mat-label>Filter</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input>
    </mat-form-field>

    @for (user of filteredUsers; track user.id) {
        <div class="row my-2 gap-3 align-items-center">
            <span class="col fw-bold ellipsis">
                <i class="bi bi-typescript me-2"></i>
                {{user.emailAddress}}
            </span>
            <mat-form-field appearance="outline" class="col">
                <mat-label >Roles</mat-label>
                <mat-select multiple>
                    @for (role of roles; track role.id) {
                        <mat-option [value]="role.id">
                            {{ role.displayLabel }}
                        </mat-option>
                    }
                </mat-select>
            </mat-form-field>
            <mat-slide-toggle class="col-1" (change)="onDisableToggleChange($event)"></mat-slide-toggle>
            <button class="col-1 text-danger" 
                matButton="outlined" 
                matTooltip="Delete role" 
                (click)="deleteUser(user.id)">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    }
</div>
