<div>
    @if (_canEdit && _isEditing) {
        <quill-editor class="w-100" [(ngModel)]="content">
        </quill-editor>
        <button 
            matButton="outlined" 
            class="save-button"
            type="button" 
            (click)="onSaveClick()"
        >   Save
        </button>
    }
    @else {
        @if (content) {
            <quill-view [content]="content"></quill-view>
        }
    } 
</div>
