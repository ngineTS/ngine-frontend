<mat-drawer-container class="sidenav-container" [style.backgroundColor]="appBackgroundColor$ | async">
  <mat-drawer #drawer class="sidenav-content" mode="side">
    <div class="sidenav-header">
      <strong class="fs-5">Manage Style</strong>
      <i class="bi bi-chevron-left sidenav-close-icon" (click)="onCloseSideNav()"></i>
    </div>

    @if (sideNavFormConfiguration) {
      <app-generic-form
        [formConfiguration]="sideNavFormConfiguration"
        (onFormValueChange)="onSideNavFormValueChange($event)"
        (action)="onSideNavAction($event)"
      >
      </app-generic-form>
    }
  </mat-drawer>

  @if (_appService.userGlobalNavigationPermission?.includes('edit')) {
    <button 
      cdkDrag 
      class="general-setting-button"
      (click)="onHouseSettingsClick()"
    >
      <i class="bi bi-house-gear house-gear-icon"></i>
    </button>
  }

  <router-outlet />

</mat-drawer-container>
